upstream backend {
    server ecommerceapi-backend-1:5051;  # NO PROTOCOL (http:// NOT ALLOWED HERE)
}

server {
    listen 80;

    location /api/ {
        proxy_pass http://backend;  # Use the upstream name, NOT direct IP or port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
