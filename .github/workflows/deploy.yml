name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Services to Fly.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Fly.io CLI
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "FLYCTL_INSTALL=$HOME/.fly" >> $GITHUB_ENV
          echo "$HOME/.fly/bin" >> $GITHUB_PATH
          source $GITHUB_ENV

      - name: Verify Fly.io CLI Installation
        run: flyctl version

      - name: Authenticate with Fly.io
        run: flyctl auth token | flyctl auth --access-token ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy Backend, Redis, and Nginx
        run: flyctl deploy -a ecommerce-api
